<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexsora Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for simple UI icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Hide scrollbar for clean chat UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 hidden" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer" onclick="navigate('dashboard')">
                    <div class="bg-indigo-600 p-2 rounded-lg mr-2 text-white">
                        <i class="ph-bold ph-briefcase text-xl"></i>
                    </div>
                    <span class="font-bold text-2xl text-gray-900 tracking-tight">Flex<span class="text-indigo-600">sora</span></span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-500 font-medium" id="nav-user-info"></div>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition">
                        <i class="ph-bold ph-sign-out text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT CONTAINER -->
    <main id="app-container" class="flex-grow flex flex-col"></main>

    <script>
        // ==========================================
        // 1. STATE & LOCAL STORAGE (Data Persistence)
        // ==========================================
        let state = {
            user: null, // { id, name, role }
            gigs: [],
            messages: [],
            activeChat: null, // { partnerId, partnerName }
            checkoutGig: null
        };

        // Load data from browser storage so it survives page reloads
        function loadData() {
            const savedUser = localStorage.getItem('flexsora_test_user');
            const savedGigs = localStorage.getItem('flexsora_test_gigs');
            const savedMessages = localStorage.getItem('flexsora_test_messages');

            if (savedUser) state.user = JSON.parse(savedUser);
            if (savedGigs) {
                state.gigs = JSON.parse(savedGigs);
            } else {
                // Seed dummy gigs if empty so buyer has something to look at
                state.gigs = [
                    { id: 'g1', freelancerId: 'f1', freelancerName: 'Alice Video', title: 'YouTube Video Editing', desc: 'Fast turnaround, modern edits.', price: 50, category: 'Video' },
                    { id: 'g2', freelancerId: 'f2', freelancerName: 'Bob Designs', title: 'Minimalist Logo Design', desc: 'I will design a modern logo for your brand.', price: 120, category: 'Design' }
                ];
            }
            if (savedMessages) state.messages = JSON.parse(savedMessages);
        }

        // Save data to browser storage
        function saveData() {
            localStorage.setItem('flexsora_test_user', JSON.stringify(state.user));
            localStorage.setItem('flexsora_test_gigs', JSON.stringify(state.gigs));
            localStorage.setItem('flexsora_test_messages', JSON.stringify(state.messages));
        }

        // ==========================================
        // 2. NAVIGATION & RENDERING ENGINE
        // ==========================================
        const container = document.getElementById('app-container');
        const navbar = document.getElementById('navbar');

        function navigate(view) {
            saveData();
            if (!state.user && view !== 'login') {
                view = 'login';
            }

            // Update Navbar
            if (state.user) {
                navbar.classList.remove('hidden');
                document.getElementById('nav-user-info').innerText = `${state.user.name} (${state.user.role.toUpperCase()})`;
            } else {
                navbar.classList.add('hidden');
            }

            // Render correct view
            container.innerHTML = '';
            if (view === 'login') renderLogin();
            else if (view === 'dashboard' && state.user.role === 'buyer') renderBuyerDashboard();
            else if (view === 'dashboard' && state.user.role === 'freelancer') renderFreelancerDashboard();
            else if (view === 'chat') renderChat();
            else if (view === 'checkout') renderCheckout();
        }

        // ==========================================
        // 3. VIEWS (HTML GENERATORS)
        // ==========================================

        // --- LOGIN VIEW ---
        function renderLogin() {
            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center p-4">
                    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl p-8">
                        <div class="text-center mb-8">
                            <div class="inline-block bg-indigo-600 p-3 rounded-xl text-white mb-4">
                                <i class="ph-bold ph-briefcase text-4xl"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-900">Prototype Login</h2>
                            <p class="text-gray-500 text-sm mt-2">Enter any name to test the features. Data saves locally.</p>
                        </div>
                        
                        <input type="text" id="login-name" placeholder="Enter your Name" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 mb-6 focus:outline-none focus:border-indigo-600 transition">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="login('buyer')" class="border-2 border-indigo-100 hover:border-indigo-600 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl p-4 transition-all font-bold flex flex-col items-center">
                                <i class="ph-bold ph-shopping-cart text-2xl mb-2"></i> Buyer
                            </button>
                            <button onclick="login('freelancer')" class="border-2 border-emerald-100 hover:border-emerald-600 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-xl p-4 transition-all font-bold flex flex-col items-center">
                                <i class="ph-bold ph-paint-brush text-2xl mb-2"></i> Freelancer
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- BUYER DASHBOARD ---
        function renderBuyerDashboard() {
            let gigsHtml = state.gigs.map(gig => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                    <div class="h-24 bg-gradient-to-r from-indigo-500 to-purple-600 p-4 flex items-end justify-between">
                        <span class="bg-white/20 text-white px-2 py-1 rounded text-xs font-medium backdrop-blur-sm">${gig.category}</span>
                        <span class="font-bold text-white text-lg">$${gig.price}</span>
                    </div>
                    <div class="p-5 flex-grow">
                        <h3 class="font-bold text-gray-900 mb-2">${gig.title}</h3>
                        <p class="text-sm text-gray-500 mb-4">${gig.desc}</p>
                        <div class="text-xs text-gray-400 font-medium"><i class="ph-fill ph-user-circle mr-1"></i> By ${gig.freelancerName}</div>
                    </div>
                    <div class="grid grid-cols-2 border-t divide-x">
                        <button onclick="openChat('${gig.freelancerId}', '${gig.freelancerName}')" class="py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-indigo-600 transition flex justify-center items-center">
                            <i class="ph-bold ph-chat-circle text-lg mr-2"></i> Chat
                        </button>
                        <button onclick="openCheckout('${gig.id}')" class="py-3 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition">
                            Hire
                        </button>
                    </div>
                </div>
            `).join('');

            if(state.gigs.length === 0) gigsHtml = `<div class="col-span-full text-center py-10 text-gray-500">No gigs available right now.</div>`;

            container.innerHTML = `
                <div class="max-w-7xl mx-auto w-full px-4 py-8">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Marketplace</h1>
                    <p class="text-gray-500 mb-8">Browse and hire top community talent.</p>
                    <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">
                        ${gigsHtml}
                    </div>
                </div>
            `;
        }

        // --- FREELANCER DASHBOARD ---
        function renderFreelancerDashboard() {
            // Find gigs owned by me
            const myGigs = state.gigs.filter(g => g.freelancerId === state.user.id);
            let myGigsHtml = myGigs.map(gig => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center mb-3">
                    <div>
                        <h4 class="font-bold text-gray-900">${gig.title}</h4>
                        <p class="text-sm text-gray-500">$${gig.price} • ${gig.category}</p>
                    </div>
                    <button onclick="deleteGig('${gig.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg"><i class="ph-bold ph-trash"></i></button>
                </div>
            `).join('');
            if(myGigs.length === 0) myGigsHtml = `<p class="text-gray-400 text-sm">You haven't posted any gigs yet.</p>`;

            // Find people who messaged me
            // Find all unique chat partners from messages where I am involved
            let chatPartners = new Set();
            let partnerNames = {};
            state.messages.forEach(m => {
                if (m.chatId.includes(state.user.id) && m.senderId !== 'system') {
                    const partnerId = m.senderId === state.user.id ? m.chatId.replace(state.user.id, '').replace('_', '') : m.senderId;
                    chatPartners.add(partnerId);
                    if(m.senderId !== state.user.id) partnerNames[partnerId] = m.senderName; // capture their name
                }
            });

            let inboxHtml = Array.from(chatPartners).map(pid => `
                <button onclick="openChat('${pid}', '${partnerNames[pid] || 'Client'}')" class="w-full text-left p-3 border border-gray-100 rounded-lg hover:bg-gray-50 mb-2 flex items-center justify-between">
                    <span class="font-medium text-gray-800">${partnerNames[pid] || 'Client'}</span>
                    <i class="ph-bold ph-caret-right text-gray-400"></i>
                </button>
            `).join('');
            if(chatPartners.size === 0) inboxHtml = `<p class="text-gray-400 text-sm">No messages yet.</p>`;

            container.innerHTML = `
                <div class="max-w-7xl mx-auto w-full px-4 py-8 grid md:grid-cols-3 gap-8">
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8">
                            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="ph-bold ph-plus-circle text-indigo-600 mr-2 text-2xl"></i> Post a New Gig</h2>
                            <div class="space-y-4">
                                <input type="text" id="gig-title" placeholder="Gig Title (e.g., Logo Design)" class="w-full border rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                                <textarea id="gig-desc" placeholder="Describe what you will do..." class="w-full border rounded-lg px-4 py-2 focus:border-indigo-500 outline-none h-24"></textarea>
                                <div class="flex space-x-4">
                                    <input type="number" id="gig-price" placeholder="Price ($)" class="w-1/2 border rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                                    <select id="gig-category" class="w-1/2 border rounded-lg px-4 py-2 focus:border-indigo-500 outline-none bg-white">
                                        <option value="Video">Video Editing</option>
                                        <option value="Design">Design</option>
                                        <option value="Programming">Programming</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <button onclick="postGig()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Publish Gig</button>
                            </div>
                        </div>

                        <h3 class="font-bold text-gray-800 text-lg mb-4">My Active Gigs</h3>
                        ${myGigsHtml}
                    </div>
                    
                    <div>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sticky top-20">
                            <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center"><i class="ph-bold ph-chats text-emerald-500 mr-2 text-2xl"></i> Inbox</h3>
                            ${inboxHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- CHAT VIEW ---
        function renderChat() {
            const chatId = [state.user.id, state.activeChat.partnerId].sort().join('_');
            const chatMsgs = state.messages.filter(m => m.chatId === chatId);

            let msgsHtml = chatMsgs.map(m => {
                if(m.senderId === 'system') {
                    return `<div class="text-center my-4"><span class="bg-amber-100 text-amber-800 text-xs px-3 py-1 rounded-full font-medium">${m.text}</span></div>`;
                }
                const isMe = m.senderId === state.user.id;
                return `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'} mb-3">
                        <div class="max-w-[75%] rounded-2xl px-4 py-2 ${isMe ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-gray-200 text-gray-800 rounded-bl-none'}">
                            ${m.text}
                        </div>
                    </div>
                `;
            }).join('');

            if(chatMsgs.length === 0) msgsHtml = `<div class="h-full flex items-center justify-center text-gray-400">Say hello to start the conversation!</div>`;

            container.innerHTML = `
                <div class="flex-grow max-w-3xl w-full mx-auto p-4 flex flex-col h-[calc(100vh-64px)]">
                    <div class="bg-white rounded-t-2xl shadow-sm border border-b-0 p-4 flex items-center">
                        <button onclick="navigate('dashboard')" class="mr-3 p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition"><i class="ph-bold ph-arrow-left"></i></button>
                        <div>
                            <h2 class="font-bold text-lg leading-tight">${state.activeChat.partnerName}</h2>
                            <p class="text-xs text-emerald-500 font-medium">Online</p>
                        </div>
                    </div>
                    
                    <div id="chat-messages-container" class="flex-grow bg-white border-x border-gray-200 p-4 overflow-y-auto no-scrollbar">
                        ${msgsHtml}
                    </div>
                    
                    <div class="bg-white rounded-b-2xl shadow-sm border p-3 flex items-center">
                        <input type="text" id="chat-input" onkeypress="handleChatKeyPress(event)" placeholder="Type a message..." class="flex-grow bg-gray-100 rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500">
                        <button onclick="sendChatMessage()" class="ml-2 bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-full transition flex-shrink-0">
                            <i class="ph-bold ph-paper-plane-right text-xl"></i>
                        </button>
                    </div>
                </div>
            `;

            // Auto-scroll to bottom
            const msgContainer = document.getElementById('chat-messages-container');
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // --- CHECKOUT VIEW ---
        function renderCheckout() {
            const gig = state.checkoutGig;
            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center p-4">
                    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden">
                        <div class="bg-slate-900 p-6 text-white text-center relative">
                            <button onclick="navigate('dashboard')" class="absolute top-4 left-4 text-slate-400 hover:text-white transition"><i class="ph-bold ph-x text-xl"></i></button>
                            <i class="ph-bold ph-credit-card text-5xl mb-2 text-indigo-400"></i>
                            <h2 class="text-2xl font-bold">Secure Checkout</h2>
                        </div>
                        <div class="p-6">
                            <div class="border border-gray-100 bg-gray-50 rounded-xl p-4 mb-6">
                                <h3 class="font-bold text-gray-900 text-lg">${gig.title}</h3>
                                <p class="text-sm text-gray-500 mb-3">by ${gig.freelancerName}</p>
                                <div class="flex justify-between items-center border-t pt-3 font-bold text-xl">
                                    <span>Total</span>
                                    <span class="text-indigo-600">$${gig.price}</span>
                                </div>
                            </div>

                            <p class="text-xs text-gray-400 mb-6 text-center">In the real app, this will open the Razorpay popup. Here, clicking Pay simulates a successful transaction.</p>

                            <button onclick="simulatePayment()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-md transition transform hover:-translate-y-1">
                                Simulate Payment with Razorpay
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }


        // ==========================================
        // 4. ACTION LOGIC
        // ==========================================

        function login(role) {
            const nameInput = document.getElementById('login-name').value.trim();
            if(!nameInput) {
                alert("Please enter a name for testing.");
                return;
            }
            // Generate a fake ID based on name to keep it consistent in this browser
            const id = role.charAt(0) + '_' + nameInput.toLowerCase().replace(/\s+/g, '');
            
            state.user = { id: id, name: nameInput, role: role };
            navigate('dashboard');
        }

        function logout() {
            state.user = null;
            navigate('login');
        }

        function postGig() {
            const title = document.getElementById('gig-title').value.trim();
            const desc = document.getElementById('gig-desc').value.trim();
            const price = document.getElementById('gig-price').value;
            const cat = document.getElementById('gig-category').value;

            if(!title || !desc || !price) {
                alert("Please fill all fields");
                return;
            }

            const newGig = {
                id: 'gig_' + Date.now(),
                freelancerId: state.user.id,
                freelancerName: state.user.name,
                title: title,
                desc: desc,
                price: parseFloat(price),
                category: cat
            };

            state.gigs.unshift(newGig); // add to front
            navigate('dashboard'); // refresh view and save
        }

        function deleteGig(gigId) {
            if(confirm("Delete this gig?")) {
                state.gigs = state.gigs.filter(g => g.id !== gigId);
                navigate('dashboard');
            }
        }

        function openChat(partnerId, partnerName) {
            state.activeChat = { partnerId, partnerName };
            navigate('chat');
        }

        function handleChatKeyPress(e) {
            if(e.key === 'Enter') sendChatMessage();
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const chatId = [state.user.id, state.activeChat.partnerId].sort().join('_');
            
            state.messages.push({
                id: 'msg_' + Date.now(),
                chatId: chatId,
                senderId: state.user.id,
                senderName: state.user.name,
                text: text,
                timestamp: Date.now()
            });

            // Re-render chat to show message
            navigate('chat');
        }

        function openCheckout(gigId) {
            state.checkoutGig = state.gigs.find(g => g.id === gigId);
            navigate('checkout');
        }

        function simulatePayment() {
            alert("Payment Successful! Notification sent to freelancer.");
            
            // Generate system message
            const chatId = [state.user.id, state.checkoutGig.freelancerId].sort().join('_');
            state.messages.push({
                id: 'msg_' + Date.now(),
                chatId: chatId,
                senderId: 'system',
                text: `🎉 Payment of $${state.checkoutGig.price} received for "${state.checkoutGig.title}". You may begin working!`,
                timestamp: Date.now()
            });

            state.checkoutGig = null;
            navigate('dashboard');
        }

        // ==========================================
        // 5. INITIALIZATION
        // ==========================================
        window.onload = () => {
            loadData();
            navigate('dashboard'); // Will auto-redirect to login if no user
        };

    </script>
</body>
</html>
