<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexsora Pro - Premium Freelance Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Top Navigation -->
    <nav class="glass-nav shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all" id="navbar">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <div class="flex items-center cursor-pointer mr-8 group" onclick="window.navigate('home')">
                        <i class="ph-fill ph-hexagon text-3xl text-indigo-600 mr-2 group-hover:rotate-12 transition-transform"></i>
                        <span class="font-extrabold text-2xl text-slate-900 tracking-tight">Flexsora</span>
                    </div>
                    <div class="hidden md:flex space-x-1" id="nav-links"></div>
                </div>
                <!-- User Actions -->
                <div class="flex items-center space-x-4" id="nav-actions"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow flex flex-col w-full max-w-[1400px] mx-auto p-4 sm:p-6 lg:p-8">
        <div class="flex justify-center items-center h-full py-20">
            <div class="animate-pulse flex flex-col items-center">
                <i class="ph-duotone ph-hexagon text-6xl text-indigo-300 mb-4 animate-spin" style="animation-duration: 3s;"></i>
                <p class="text-slate-400 font-bold uppercase tracking-widest">Loading Flexsora...</p>
            </div>
        </div>
    </main>

    <!-- Firebase & Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. SYSTEM CONFIGURATION
        // ==========================================
        
        // IMPORTANT: Change this to YOUR actual Google Email address. 
        // When you log in with this email, you will see the Admin Panel.
        const ADMIN_EMAIL = "your-email@gmail.com"; 

        // Firebase Setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'flexsora-live';

        // ==========================================
        // 2. STATE MANAGEMENT & CONSTANTS
        // ==========================================
        window.state = {
            user: null, 
            users: [], 
            projects: [], 
            bids: [], 
            messages: [],
            milestones: [],
            currentView: 'home',
            viewData: null, 
            browseFilters: { search: '', skill: 'All', status: 'open' }
        };

        let unsubscribers = [];
        const SKILLS = ['Web Development', 'Mobile Apps', 'Graphic Design', 'Video Editing', 'Writing', 'Data Entry', 'Digital Marketing'];
        const GATEWAY_FEE_PERCENT = 0.035; 
        const PLATFORM_FEE_PERCENT = 0.20; 
        const formatINR = (amount) => '₹' + amount.toLocaleString('en-IN');

        // ==========================================
        // 3. AUTHENTICATION & DATABASE LISTENERS
        // ==========================================
        
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else if(!auth.currentUser) {
                    // Fallback for preview
                    await signInAnonymously(auth);
                }
            } catch(e) { console.error("Auth Init Error", e); }
        };
        initAuth();

        onAuthStateChanged(auth, async (firebaseUser) => {
            if (firebaseUser) {
                // Fetch User Profile from Database
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', firebaseUser.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    window.state.user = userSnap.data();
                    
                    // Force admin role if email matches
                    if(window.state.user.email === ADMIN_EMAIL && window.state.user.role !== 'admin') {
                        window.state.user.role = 'admin';
                        await updateDoc(userRef, { role: 'admin' });
                    }

                    setupRealtimeListeners();
                    navigate('dashboard');
                } else {
                    // New User Registration
                    window.state.user = { 
                        uid: firebaseUser.uid, 
                        name: firebaseUser.displayName || 'New User', 
                        email: firebaseUser.email || 'anonymous@flexsora.com'
                    };
                    
                    if(window.state.user.email === ADMIN_EMAIL) {
                         // Auto-register Admin
                         window.completeRegistration('admin');
                    } else {
                         navigate('onboarding');
                    }
                }
            } else {
                window.state.user = null;
                unsubscribers.forEach(unsub => unsub());
                unsubscribers = [];
                navigate('home');
            }
        });

        function setupRealtimeListeners() {
            unsubscribers.forEach(unsub => unsub());
            unsubscribers = [];

            const colPath = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

            unsubscribers.push(onSnapshot(colPath('users'), (snap) => {
                window.state.users = snap.docs.map(d => d.data());
                // Update local session user object if balance changes
                const me = window.state.users.find(u => u.uid === window.state.user.uid);
                if(me) window.state.user = me;
                reRender();
            }, (e) => console.error(e)));

            unsubscribers.push(onSnapshot(colPath('projects'), (snap) => {
                window.state.projects = snap.docs.map(d => d.data());
                reRender();
            }, (e) => console.error(e)));

            unsubscribers.push(onSnapshot(colPath('bids'), (snap) => {
                window.state.bids = snap.docs.map(d => d.data());
                reRender();
            }, (e) => console.error(e)));

            unsubscribers.push(onSnapshot(colPath('messages'), (snap) => {
                window.state.messages = snap.docs.map(d => d.data());
                if(window.state.currentView === 'workspace') renderWorkspace(window.state.viewData);
            }, (e) => console.error(e)));

            unsubscribers.push(onSnapshot(colPath('milestones'), (snap) => {
                window.state.milestones = snap.docs.map(d => d.data());
                reRender();
            }, (e) => console.error(e)));
        }

        function reRender() {
            if(window.state.currentView === 'dashboard') {
                if(window.state.user.role === 'client') renderClientDashboard();
                else if(window.state.user.role === 'freelancer') renderFreelancerDashboard();
                else renderAdmin();
            }
            else if(window.state.currentView === 'browse') renderBrowseProjects();
            else if(window.state.currentView === 'admin') renderAdmin();
            else if(window.state.currentView === 'project_details') renderProjectDetails(window.state.viewData);
            else if(window.state.currentView === 'workspace') renderWorkspace(window.state.viewData);
        }

        // ==========================================
        // 4. ACTION EXPORTS
        // ==========================================
        
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed", error);
                alert("Google Login popup blocked. Please open this site outside of an iframe or use the simulated preview login.");
            }
        };

        window.logout = () => signOut(auth);

        window.navigate = (view, data = null) => {
            window.state.currentView = view;
            window.state.viewData = data;
            
            updateNavbar();
            document.getElementById('app-container').innerHTML = '';
            window.scrollTo(0, 0);

            if (view === 'home') renderHome();
            else if (view === 'login') renderLogin();
            else if (view === 'onboarding') renderOnboarding();
            else if (view === 'dashboard' && window.state.user) {
                if(window.state.user.role === 'client') renderClientDashboard();
                else if(window.state.user.role === 'freelancer') renderFreelancerDashboard();
                else renderAdmin();
            }
            else if (view === 'browse') renderBrowseProjects();
            else if (view === 'post_project') renderPostProject();
            else if (view === 'project_details') renderProjectDetails(data);
            else if (view === 'checkout') renderCheckout(data);
            else if (view === 'workspace') renderWorkspace(data);
            else if (view === 'admin') renderAdmin();
        };

        // --- Core Database Actions ---

        window.completeRegistration = async (role) => {
            const name = document.getElementById('reg-name')?.value.trim() || window.state.user.name;
            if(!name) return alert("Please enter your name.");
            
            let skills = [];
            if(role === 'freelancer') {
                const checkboxes = document.querySelectorAll('input[name="reg_skills"]:checked');
                skills = Array.from(checkboxes).map(cb => cb.value);
            }

            const userData = {
                uid: window.state.user.uid,
                name: name,
                email: window.state.user.email || '',
                role: role,
                balance: 0, // Starts at 0
                skills: skills,
                joined: Date.now()
            };

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', window.state.user.uid);
            await setDoc(userRef, userData);
            window.state.user = userData;
            setupRealtimeListeners();
            navigate('dashboard');
        };

        window.addMockFunds = async (amount) => {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', window.state.user.uid);
            await updateDoc(userRef, { balance: (window.state.user.balance || 0) + amount });
            alert(`Added ${formatINR(amount)} to your wallet for testing!`);
        };

        window.submitProject = async () => {
            const title = document.getElementById('post-title').value.trim();
            const desc = document.getElementById('post-desc').value.trim();
            const minB = parseInt(document.getElementById('post-min').value);
            const maxB = parseInt(document.getElementById('post-max').value);
            
            const checkboxes = document.querySelectorAll('input[name="project_skills"]:checked');
            const skills = Array.from(checkboxes).map(cb => cb.value);

            if(!title || !desc || isNaN(minB) || isNaN(maxB) || skills.length === 0) {
                return alert("Please fill all fields and select at least one skill.");
            }

            const pId = 'proj_' + Date.now();
            const projectData = {
                id: pId,
                clientId: window.state.user.uid,
                clientName: window.state.user.name,
                title, desc, skills,
                minBudget: minB, maxBudget: maxB,
                status: 'open',
                timestamp: Date.now()
            };

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', pId), projectData);
            navigate('dashboard');
        };

        window.placeBid = async (projectId) => {
            const amount = parseInt(document.getElementById('bid-amount').value);
            const days = parseInt(document.getElementById('bid-days').value);
            const prop = document.getElementById('bid-prop').value.trim();

            if(!amount || !days || !prop) return alert("Fill all bid details.");

            const bidId = 'bid_' + Date.now() + '_' + window.state.user.uid.substring(0,5);
            const bidData = {
                id: bidId,
                projectId: projectId,
                freelancerId: window.state.user.uid,
                freelancerName: window.state.user.name,
                amount, days, proposal: prop,
                timestamp: Date.now()
            };

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bids', bidId), bidData);
            alert("Proposal submitted successfully!");
            navigate('project_details', projectId);
        };

        window.processPayment = async (projectId, bidId, totalPaid, escrowAmount, gatewayFee) => {
            if(window.state.user.balance < totalPaid) {
                return alert(`Insufficient wallet balance! You have ${formatINR(window.state.user.balance)}, need ${formatINR(totalPaid)}. Please add funds to your wallet from your Dashboard.`);
            }

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', window.state.user.uid);
            await updateDoc(userRef, { balance: window.state.user.balance - totalPaid });

            const projRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectId);
            const bid = window.state.bids.find(b => b.id === bidId);
            await updateDoc(projRef, {
                status: 'in_progress',
                awardedTo: bid.freelancerId,
                awardedBidAmount: escrowAmount
            });

            const mId = 'mile_' + Date.now();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'milestones', mId), {
                id: mId, projectId: projectId, amount: escrowAmount, gatewayFee: gatewayFee, status: 'funded', timestamp: Date.now()
            });

            const msgId = 'msg_' + Date.now();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', msgId), {
                id: msgId, chatId: projectId, senderId: 'system',
                text: `🚀 Project Awarded! ${formatINR(escrowAmount)} has been securely funded in Escrow. Freelancer, you may begin working.`,
                timestamp: Date.now()
            });

            alert("Payment Successful! Funds secured in Escrow.");
            navigate('workspace', projectId);
        };

        window.sendWsMsg = async (projectId, forcedText = null) => {
            const text = forcedText || document.getElementById('ws-chat-input')?.value.trim();
            if(!text) return;
            
            const msgId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', msgId), {
                id: msgId, chatId: projectId, senderId: window.state.user.uid, text, timestamp: Date.now()
            });
            
            if(!forcedText) document.getElementById('ws-chat-input').value = '';
        };

        window.markDelivered = async (milestoneId) => {
            if(!confirm("Submit work for review?")) return;
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'milestones', milestoneId);
            await updateDoc(mRef, { status: 'delivered' });
            
            const milestone = window.state.milestones.find(m => m.id === milestoneId);
            window.sendWsMsg(milestone.projectId, "✅ Freelancer marked the work as DONE. Client, please review.");
        };

        window.approveWork = async (milestoneId) => {
            if(!confirm("Approve work and trigger admin payout?")) return;
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'milestones', milestoneId);
            await updateDoc(mRef, { status: 'approved' });
            
            const milestone = window.state.milestones.find(m => m.id === milestoneId);
            window.sendWsMsg(milestone.projectId, "🎉 Client approved the work! Awaiting Admin payout.");
        };

        window.adminReleaseFunds = async (milestoneId) => {
            if(!confirm("Release funds? (Deducts 20% fee)")) return;
            const milestone = window.state.milestones.find(m => m.id === milestoneId);
            const proj = window.state.projects.find(p => p.id === milestone.projectId);
            const freelancer = window.state.users.find(u => u.uid === proj.awardedTo);
            
            const platformFee = milestone.amount * PLATFORM_FEE_PERCENT;
            const payout = milestone.amount - platformFee;

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'milestones', milestoneId), { 
                status: 'released',
                platformFeeCollected: platformFee 
            });
            
            if(freelancer) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', freelancer.uid), {
                    balance: (freelancer.balance || 0) + payout
                });
            }

            window.sendWsMsg(milestone.projectId, `💸 Admin released payment. Freelancer received ${formatINR(payout)} (After 20% fee). Project Complete!`);
            
            // Mark project as completed if all milestones are released
            const remaining = window.state.milestones.filter(m => m.projectId === proj.id && m.status !== 'released' && m.id !== milestoneId);
            if(remaining.length === 0) {
                 await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', proj.id), { status: 'completed' });
            }
        };

        // Helpers
        window.applyFilters = () => {
            window.state.browseFilters.search = document.getElementById('browse-search').value;
            window.state.browseFilters.skill = document.getElementById('browse-skill').value;
            renderBrowseProjects();
        };
        window.initiateAward = (projectId, bidId) => navigate('checkout', { projectId, bidId });
        window.simulateFileUpload = (projectId) => {
            const fileTypes = ['.pdf', '.zip', '.png', '.mp4'];
            const type = fileTypes[Math.floor(Math.random() * fileTypes.length)];
            window.sendWsMsg(projectId, `📎 project_deliverables${type} (Simulated File)`);
        };

        // ==========================================
        // 5. UI RENDER FUNCTIONS
        // ==========================================
        const container = document.getElementById('app-container');

        function updateNavbar() {
            const navLinks = document.getElementById('nav-links');
            const navActions = document.getElementById('nav-actions');

            if (!window.state.user || !window.state.user.role) {
                navLinks.innerHTML = `<button onclick="window.navigate('browse')" class="px-3 py-2 text-slate-600 hover:text-indigo-600 font-semibold transition">Browse Projects</button>`;
                navActions.innerHTML = `
                    <button onclick="window.loginWithGoogle()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold transition shadow-sm hover:shadow flex items-center"><i class="ph-bold ph-google-logo mr-2"></i> Log in / Sign up</button>
                `;
                return;
            }

            const baseBtnClass = "px-4 py-2 rounded-xl font-semibold transition-all";
            const activeClass = "bg-indigo-50 text-indigo-700 shadow-sm";
            const inactiveClass = "text-slate-600 hover:bg-slate-100 hover:text-slate-900";

            let links = `<button onclick="window.navigate('dashboard')" class="${baseBtnClass} ${window.state.currentView === 'dashboard' ? activeClass : inactiveClass}">Dashboard</button>`;
            
            if (window.state.user.role === 'client') {
                links += `
                    <button onclick="window.navigate('post_project')" class="${baseBtnClass} ${window.state.currentView === 'post_project' ? activeClass : inactiveClass}">Post a Project</button>
                    <button onclick="window.navigate('browse')" class="${baseBtnClass} ${window.state.currentView === 'browse' ? activeClass : inactiveClass}">Find Talent</button>
                `;
            } else if (window.state.user.role === 'freelancer') {
                links += `<button onclick="window.navigate('browse')" class="${baseBtnClass} ${window.state.currentView === 'browse' ? activeClass : inactiveClass}">Find Work</button>`;
            } else if (window.state.user.role === 'admin') {
                links += `<button onclick="window.navigate('admin')" class="${baseBtnClass} bg-slate-900 text-white">Admin Console</button>`;
            }

            navLinks.innerHTML = links;

            let balanceBadge = window.state.user.role !== 'admin' ? 
                `<div class="hidden sm:flex items-center bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100 mr-2 cursor-help shadow-sm">
                    <i class="ph-bold ph-wallet text-emerald-600 mr-2"></i>
                    <span class="font-bold text-emerald-700">${formatINR(window.state.user.balance || 0)}</span>
                </div>` : '';

            navActions.innerHTML = `
                ${balanceBadge}
                <div class="h-8 w-px bg-slate-200 mx-2 hidden sm:block"></div>
                <div class="flex items-center group px-2 py-1 rounded-xl">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white flex items-center justify-center font-bold text-sm shadow-md">
                        ${(window.state.user.name || 'U').charAt(0).toUpperCase()}
                    </div>
                    <div class="ml-2 hidden sm:block">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${window.state.user.name}</p>
                        <p class="text-[10px] text-indigo-600 uppercase tracking-wider font-bold">${window.state.user.role}</p>
                    </div>
                </div>
                <button onclick="window.logout()" class="ml-2 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition" title="Logout"><i class="ph-bold ph-sign-out text-xl"></i></button>
            `;
        }

        function renderLogin() {
            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center py-12 animate-fade-in">
                    <div class="bg-white max-w-md w-full rounded-3xl shadow-2xl border border-slate-100 overflow-hidden text-center p-10 relative">
                        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-indigo-50 opacity-50 blur-2xl"></div>
                        <i class="ph-fill ph-hexagon text-6xl text-indigo-600 mb-6 drop-shadow-md"></i>
                        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Join Flexsora</h2>
                        <p class="text-slate-500 font-medium mb-8">Access the world's premium talent network securely.</p>
                        
                        <button onclick="window.loginWithGoogle()" class="w-full bg-white border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 text-slate-800 font-bold text-lg py-4 rounded-xl shadow-sm transition flex items-center justify-center">
                            <i class="ph-bold ph-google-logo text-2xl mr-3 text-red-500"></i> Continue with Google
                        </button>
                        <p class="text-xs text-slate-400 mt-6">By signing up, you agree to our Terms of Service.</p>
                    </div>
                </div>
            `;
        }

        function renderOnboarding() {
            const skillChecks = SKILLS.map(s => `
                <label class="flex items-center space-x-2 p-3 border border-slate-200 rounded-xl cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 transition">
                    <input type="checkbox" name="reg_skills" value="${s}" class="w-4 h-4 text-indigo-600 rounded">
                    <span class="text-sm font-bold text-slate-700">${s}</span>
                </label>
            `).join('');

            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center py-12 animate-fade-in">
                    <div class="bg-white max-w-lg w-full rounded-3xl shadow-2xl border border-slate-100 overflow-hidden p-8">
                        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Complete Profile</h2>
                        <p class="text-slate-500 font-medium mb-8">Tell us how you want to use Flexsora.</p>
                        
                        <label class="block text-xs font-extrabold text-slate-500 mb-2 uppercase tracking-wider">Display Name</label>
                        <input type="text" id="reg-name" value="${window.state.user.name || ''}" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 mb-6 font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50">
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <button onclick="document.getElementById('freelancer-extras').classList.add('hidden'); window.selectedRole = 'client';" class="border-2 border-slate-200 focus:border-indigo-600 focus:bg-indigo-50 text-slate-700 rounded-xl p-4 font-extrabold text-center hover:shadow-md transition">Client</button>
                            <button onclick="document.getElementById('freelancer-extras').classList.remove('hidden'); window.selectedRole = 'freelancer';" class="border-2 border-slate-200 focus:border-emerald-600 focus:bg-emerald-50 text-slate-700 rounded-xl p-4 font-extrabold text-center hover:shadow-md transition">Freelancer</button>
                        </div>

                        <div id="freelancer-extras" class="hidden mb-6">
                            <label class="block text-xs font-extrabold text-slate-500 mb-2 uppercase tracking-wider">Select Your Skills</label>
                            <div class="grid grid-cols-2 gap-3">${skillChecks}</div>
                        </div>

                        <button onclick="window.completeRegistration(window.selectedRole || 'client')" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition">Save & Start Browsing</button>
                    </div>
                </div>
            `;
        }

        function renderClientDashboard() {

                    statusBadge = `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Review</span>`;
                    if(isClient) btn = `<button onclick="window.approveWork('${m.id}')" class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-2.5 rounded-lg text-xs shadow-md transition"><i class="ph-bold ph-check mr-1"></i>Approve & Release</button>`;
                } else if(m.status === 'approved') {
                    statusBadge = `<span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Admin Release</span>`;
                } else if(m.status === 'released') {
                    statusBadge = `<span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Released</span>`;
                }
                
                return `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-4 shadow-sm relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${m.status==='released'?'bg-emerald-500':'bg-amber-400'}"></div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black text-slate-900 text-xl">${formatINR(m.amount)}</span>
                            ${statusBadge}
                        </div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Escrow Funds</div>
                        ${!isClient && m.status !== 'released' ? `<p class="text-xs text-emerald-600 font-bold mt-2">You receive: ${formatINR(m.amount * (1-PLATFORM_FEE_PERCENT))}</p>` : ''}
                        ${btn}
                    </div>`;
            }).join('');

            const chatMsgs = window.state.messages.filter(m => m.chatId === projectId).sort((a,b) => a.timestamp - b.timestamp);
            let msgsHtml = chatMsgs.map(m => {
                if(m.senderId === 'system') return `<div class="text-center my-4"><span class="bg-slate-800 text-white text-[10px] font-bold uppercase tracking-widest px-4 py-1.5 rounded-full shadow-md">${m.text}</span></div>`;
                
                const isMe = m.senderId === window.state.user.uid;
                const isFile = m.text.includes("📎");
                return `
                    <div class="mb-4 flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <div class="max-w-[85%] px-5 py-3 rounded-2xl text-sm font-medium shadow-sm ${isMe ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-white border border-slate-200 text-slate-800 rounded-bl-none'} ${isFile ? 'border-2 border-dashed border-indigo-300' : ''}">
                            ${m.text}
                        </div>
                        <span class="text-[9px] text-slate-400 font-bold mt-1 px-1">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>`;
            }).join('');
            if(chatMsgs.length === 0) msgsHtml = `<div class="h-full flex items-center justify-center text-slate-400 font-bold text-sm"><i class="ph-duotone ph-chats text-4xl mr-2 text-slate-300"></i>Send a message to start collaborating.</div>`;

            container.innerHTML = `
                <div class="max-w-6xl mx-auto w-full h-[calc(100vh-120px)] flex flex-col md:flex-row border border-slate-200 rounded-3xl overflow-hidden bg-white shadow-2xl animate-fade-in">
                    
                    <div class="flex-1 flex flex-col relative bg-slate-50/50">
                        <div class="bg-slate-900 p-5 text-white flex justify-between items-center z-10 shadow-md">
                            <div>
                                <h2 class="font-extrabold text-lg truncate max-w-md">${project.title}</h2>
                                <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mt-1"><i class="ph-fill ph-circle text-[8px] text-emerald-400 mr-1 animate-pulse"></i> Live Workspace</p>
                            </div>
                        </div>
                        <div id="ws-chat" class="flex-1 p-6 overflow-y-auto absolute inset-0 top-[76px] bottom-20">${msgsHtml}</div>
                        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-slate-200">
                            <div class="flex items-center bg-slate-100 rounded-2xl p-1.5 border border-slate-200 focus-within:ring-2 focus-within:ring-indigo-100 transition">
                                <button onclick="window.simulateFileUpload('${projectId}')" class="p-3 text-slate-400 hover:text-indigo-600 transition"><i class="ph-bold ph-paperclip text-lg"></i></button>
                                <input type="text" id="ws-chat-input" onkeypress="if(event.key==='Enter') window.sendWsMsg('${projectId}')" placeholder="Type a message..." class="flex-1 bg-transparent px-3 py-2 outline-none font-medium text-slate-800">
                                <button onclick="window.sendWsMsg('${projectId}')" class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl shadow-md transition"><i class="ph-bold ph-paper-plane-right text-lg"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="w-full md:w-80 border-t md:border-t-0 md:border-l border-slate-200 bg-slate-50 flex flex-col z-10 shadow-[-5px_0_15px_-10px_rgba(0,0,0,0.1)]">
                        <div class="p-5 border-b border-slate-200 bg-white"><h3 class="font-extrabold uppercase text-sm tracking-wider flex items-center"><i class="ph-fill ph-lock-key text-indigo-500 mr-2 text-lg"></i> Escrow Vault</h3></div>
                        <div class="p-5 overflow-y-auto flex-1">${milestoneHtml}</div>
                    </div>
                </div>`;
            
            const chatBox = document.getElementById('ws-chat');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderAdmin() {
            let totalRevenue = 0;
            let totalEscrow = 0;
            
            window.state.milestones.forEach(m => {
                if(m.status === 'released' && m.platformFeeCollected) totalRevenue += m.platformFeeCollected;
                if(m.gatewayFee) totalRevenue += m.gatewayFee; // Add Gateway fees to system revenue
                if(m.status !== 'released') totalEscrow += m.amount;
            });

            let ordersHtml = window.state.milestones.sort((a,b) => b.timestamp - a.timestamp).map(m => {
                const proj = window.state.projects.find(p => p.id === m.projectId);
                let btn = '<span class="text-xs text-slate-400 font-bold uppercase tracking-widest">No Action</span>';
                let rowClass = "";
                
                if(m.status === 'approved') {
                    btn = `<button onclick="window.adminReleaseFunds('${m.id}')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-extrabold shadow-md transition uppercase tracking-wider">Release Payout</button>`;
                    rowClass = "bg-blue-50/50";
                }

                let badge = `<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-[10px] font-bold uppercase">${m.status}</span>`;
                if(m.status === 'approved') badge = `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-[10px] font-bold uppercase border border-blue-200">Needs Payout</span>`;

                return `<tr class="border-b border-slate-100 hover:bg-slate-50 transition ${rowClass}"><td class="p-4 text-sm font-bold text-slate-900">${proj?.title || 'Unknown'}</td><td class="p-4 text-sm font-black text-slate-700">${formatINR(m.amount)}</td><td class="p-4">${badge}</td><td class="p-4 text-right">${btn}</td></tr>`;
            }).join('');
            if(window.state.milestones.length === 0) ordersHtml = `<tr><td colspan="4" class="p-8 text-center text-slate-500 font-bold">No escrow data available.</td></tr>`;

            container.innerHTML = `
                <div class="max-w-6xl mx-auto w-full space-y-8 animate-fade-in">
                    <div class="bg-slate-900 p-8 rounded-3xl text-white shadow-2xl flex flex-col md:flex-row items-center justify-between relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-64 h-64 bg-indigo-500 opacity-20 blur-3xl rounded-full translate-x-1/4 -translate-y-1/4"></div>
                        <div class="relative z-10 flex items-center mb-6 md:mb-0">
                            <i class="ph-fill ph-shield-check text-5xl text-indigo-400 mr-5"></i>
                            <div>
                                <h1 class="text-3xl font-extrabold mb-1">Admin Headquarters</h1>
                                <p class="text-slate-400 font-medium text-sm">Escrow controls and platform revenue tracking.</p>
                            </div>
                        </div>
                        <div class="relative z-10 text-center md:text-right bg-slate-800 p-6 rounded-2xl border border-slate-700">
                            <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1">Total Platform Profit</p>
                            <h2 class="text-3xl font-black text-white">${formatINR(totalRevenue)}</h2>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                            <p class="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-2">Locked in Escrow</p>
                            <h2 class="text-4xl font-black text-slate-900">${formatINR(totalEscrow)}</h2>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                            <p class="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-2">Registered Users</p>
                            <h2 class="text-4xl font-black text-indigo-600">${window.state.users.length}</h2>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 bg-slate-50 border-b border-slate-200"><h3 class="font-extrabold text-slate-800 uppercase tracking-wider text-sm">Escrow Management Vault</h3></div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-white text-slate-400 border-b border-slate-100 text-xs uppercase tracking-widest">
                                <tr><th class="p-5 font-bold">Project</th><th class="p-5 font-bold">Escrow Amount</th><th class="p-5 font-bold">Status</th><th class="p-5 font-bold text-right">Admin Action</th></tr>
                            </thead>
                            <tbody>${ordersHtml}</tbody>
                        </table>
                    </div>
                </div>`;
        }

    </script>
</body>
</html>
