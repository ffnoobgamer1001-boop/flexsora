<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexsora Pro - Premium Freelance Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Custom Animations */
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Top Navigation -->
    <nav class="glass-nav shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all" id="navbar">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo & Primary Links -->
                <div class="flex items-center">
                    <div class="flex items-center cursor-pointer mr-8 group" onclick="navigate('home')">
                        <i class="ph-fill ph-hexagon text-3xl text-indigo-600 mr-2 group-hover:rotate-12 transition-transform"></i>
                        <span class="font-extrabold text-2xl text-slate-900 tracking-tight">Flexsora</span>
                    </div>
                    
                    <div class="hidden md:flex space-x-1" id="nav-links">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- User Actions & Profile -->
                <div class="flex items-center space-x-4" id="nav-actions">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow flex flex-col w-full max-w-[1400px] mx-auto p-4 sm:p-6 lg:p-8"></main>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT & CONSTANTS
        // ==========================================
        let state = {
            user: null, 
            users: [], 
            projects: [], 
            bids: [], 
            messages: [],
            milestones: [],
            platformRevenue: 0, // Track Admin Profit
            
            currentView: 'home',
            viewData: null, 
            
            browseFilters: { search: '', skill: 'All', status: 'open' }
        };

        const SKILLS = ['Web Development', 'Mobile Apps', 'Graphic Design', 'Video Editing', 'Writing', 'Data Entry'];
        const GATEWAY_FEE_PERCENT = 0.035; // 3.5%
        const PLATFORM_FEE_PERCENT = 0.20; // 20%

        const formatINR = (amount) => '₹' + amount.toLocaleString('en-IN');

        const seedData = () => {
            const u1 = { id: 'c_john', name: 'John Tech', role: 'client', balance: 150000 };
            const u2 = { id: 'f_alice', name: 'Alice Dev', role: 'freelancer', balance: 0, skills: ['Web Development', 'Mobile Apps'] };
            state.users = [u1, u2];

            const p1 = {
                id: 'p_101', clientId: 'c_john', clientName: 'John Tech',
                title: 'Build a React E-commerce Frontend',
                desc: 'Looking for an experienced React developer to build a responsive storefront. Must have experience with Tailwind and Redux. API is already built.',
                skills: ['Web Development'], minBudget: 15000, maxBudget: 40000,
                status: 'open', timestamp: Date.now() - 86400000
            };
            const p2 = {
                id: 'p_102', clientId: 'c_john', clientName: 'John Tech',
                title: 'Design a Modern Tech Logo',
                desc: 'Need a sleek, minimal logo for a new AI startup. Deliverables in SVG and PNG.',
                skills: ['Graphic Design'], minBudget: 2000, maxBudget: 5000,
                status: 'open', timestamp: Date.now() - 3600000
            };
            state.projects = [p1, p2];

            state.bids = [{
                id: 'b_201', projectId: 'p_101', freelancerId: 'f_alice', freelancerName: 'Alice Dev',
                amount: 35000, days: 14, proposal: 'I have built 5 e-commerce sites using React and Tailwind. I can complete this within 2 weeks.', timestamp: Date.now() - 4000000
            }];
            state.platformRevenue = 0;
        };

        function loadData() {
            const savedUser = localStorage.getItem('fx_v3_user');
            if (savedUser) {
                state.user = JSON.parse(savedUser);
                state.users = JSON.parse(localStorage.getItem('fx_v3_users')) || [];
                state.projects = JSON.parse(localStorage.getItem('fx_v3_projects')) || [];
                state.bids = JSON.parse(localStorage.getItem('fx_v3_bids')) || [];
                state.messages = JSON.parse(localStorage.getItem('fx_v3_messages')) || [];
                state.milestones = JSON.parse(localStorage.getItem('fx_v3_milestones')) || [];
                state.platformRevenue = JSON.parse(localStorage.getItem('fx_v3_revenue')) || 0;
            } else {
                seedData();
            }
        }

        function saveData() {
            if(!state.user) return;
            localStorage.setItem('fx_v3_user', JSON.stringify(state.user));
            localStorage.setItem('fx_v3_users', JSON.stringify(state.users));
            localStorage.setItem('fx_v3_projects', JSON.stringify(state.projects));
            localStorage.setItem('fx_v3_bids', JSON.stringify(state.bids));
            localStorage.setItem('fx_v3_messages', JSON.stringify(state.messages));
            localStorage.setItem('fx_v3_milestones', JSON.stringify(state.milestones));
            localStorage.setItem('fx_v3_revenue', JSON.stringify(state.platformRevenue));
        }

        // ==========================================
        // 2. ROUTING & NAVIGATION
        // ==========================================
        const container = document.getElementById('app-container');

        function navigate(view, data = null) {
            state.currentView = view;
            state.viewData = data;
            saveData();
            
            if (!state.user && view !== 'home' && view !== 'login') {
                view = 'login';
            }

            updateNavbar();
            container.innerHTML = '';
            window.scrollTo(0, 0);

            if (view === 'home') renderHome();
            else if (view === 'login') renderLogin();
            else if (view === 'dashboard') state.user.role === 'client' ? renderClientDashboard() : renderFreelancerDashboard();
            else if (view === 'browse') renderBrowseProjects();
            else if (view === 'post_project') renderPostProject();
            else if (view === 'project_details') renderProjectDetails(data);
            else if (view === 'checkout') renderCheckout(data);
            else if (view === 'workspace') renderWorkspace(data);
            else if (view === 'admin') renderAdmin();
        }

        function updateNavbar() {
            const navLinks = document.getElementById('nav-links');
            const navActions = document.getElementById('nav-actions');

            if (!state.user) {
                navLinks.innerHTML = `<button onclick="navigate('browse')" class="px-3 py-2 text-slate-600 hover:text-indigo-600 font-semibold transition">Browse Projects</button>`;
                navActions.innerHTML = `
                    <button onclick="navigate('login')" class="text-slate-600 font-semibold hover:text-slate-900 mr-2 transition">Log In</button>
                    <button onclick="navigate('login')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl font-bold transition shadow-sm hover:shadow">Sign Up</button>
                `;
                return;
            }

            // Links based on role
            const baseBtnClass = "px-4 py-2 rounded-xl font-semibold transition-all";
            const activeClass = "bg-indigo-50 text-indigo-700 shadow-sm";
            const inactiveClass = "text-slate-600 hover:bg-slate-100 hover:text-slate-900";

            let links = `<button onclick="navigate('dashboard')" class="${baseBtnClass} ${state.currentView === 'dashboard' ? activeClass : inactiveClass}">Dashboard</button>`;
            
            if (state.user.role === 'client') {
                links += `
                    <button onclick="navigate('post_project')" class="${baseBtnClass} ${state.currentView === 'post_project' ? activeClass : inactiveClass}">Post a Project</button>
                    <button onclick="navigate('browse')" class="${baseBtnClass} ${state.currentView === 'browse' ? activeClass : inactiveClass}">Find Talent</button>
                `;
            } else if (state.user.role === 'freelancer') {
                links += `
                    <button onclick="navigate('browse')" class="${baseBtnClass} ${state.currentView === 'browse' ? activeClass : inactiveClass}">Find Work</button>
                `;
            } else if (state.user.role === 'admin') {
                links += `<button onclick="navigate('admin')" class="${baseBtnClass} bg-slate-900 text-white">System Admin</button>`;
            }

            navLinks.innerHTML = links;

            // Actions (Profile, Balance)
            let balanceBadge = state.user.role !== 'admin' ? 
                `<div class="hidden sm:flex items-center bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100 mr-2 cursor-help shadow-sm" title="Wallet Balance">
                    <i class="ph-bold ph-wallet text-emerald-600 mr-2"></i>
                    <span class="font-bold text-emerald-700">${formatINR(state.user.balance || 0)}</span>
                </div>` : '';

            navActions.innerHTML = `
                ${balanceBadge}
                <div class="h-8 w-px bg-slate-200 mx-2 hidden sm:block"></div>
                <div class="flex items-center cursor-pointer group px-2 py-1 rounded-xl hover:bg-slate-50 transition">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white flex items-center justify-center font-bold text-sm shadow-md">
                        ${state.user.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="ml-2 hidden sm:block">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${state.user.name}</p>
                        <p class="text-[10px] text-indigo-600 uppercase tracking-wider font-bold">${state.user.role}</p>
                    </div>
                </div>
                <button onclick="logout()" class="ml-2 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition" title="Logout">
                    <i class="ph-bold ph-sign-out text-xl"></i>
                </button>
            `;
        }

        // ==========================================
        // 3. AUTHENTICATION LOGIC (Login/Logout)
        // ==========================================

        function login(role) {
            let nameInput = document.getElementById('login-name').value.trim();
            if (role === 'admin') nameInput = 'System Admin';
            
            if (!nameInput && role !== 'admin') {
                alert("Please enter a name for testing.");
                return;
            }
            
            const id = role.charAt(0) + '_' + nameInput.toLowerCase().replace(/\s+/g, '') + '_' + Math.floor(Math.random()*1000);
            
            // Give client starting funds to simulate a real bank account balance
            const startBalance = role === 'client' ? 500000 : 0;
            const startSkills = role === 'freelancer' ? [SKILLS[Math.floor(Math.random() * SKILLS.length)]] : [];
            
            state.user = { id: id, name: nameInput, role: role, balance: startBalance, skills: startSkills };
            
            if (!state.users.find(u => u.name === nameInput && u.role === role)) {
                state.users.push(state.user);
            }

            navigate(role === 'admin' ? 'admin' : 'dashboard');
        }

        function logout() {
            state.user = null;
            localStorage.removeItem('fx_v3_user');
            navigate('home');
        }

        // ==========================================
        // 4. UI GENERATORS
        // ==========================================

        function renderLogin() {
            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center py-12 animate-fade-in">
                    <div class="bg-white max-w-md w-full rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                        <div class="p-8 text-center bg-gradient-to-br from-slate-900 to-indigo-950 text-white relative overflow-hidden">
                            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-indigo-500 opacity-20 blur-2xl"></div>
                            <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-purple-500 opacity-20 blur-2xl"></div>
                            
                            <i class="ph-fill ph-hexagon text-5xl text-indigo-400 mb-4 drop-shadow-lg"></i>
                            <h2 class="text-3xl font-extrabold">Welcome Back</h2>
                            <p class="text-indigo-200 text-sm mt-2 font-medium">Sign in to your prototype account</p>
                        </div>
                        <div class="p-8">
                            <input type="text" id="login-name" placeholder="Enter Full Name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 mb-6 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition text-slate-800 font-medium placeholder-slate-400 shadow-sm">
                            <p class="text-sm font-bold text-slate-700 mb-3 uppercase tracking-wider">Select Account Type:</p>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <button onclick="login('client')" class="bg-white border-2 border-slate-100 hover:border-indigo-500 hover:shadow-md text-slate-700 rounded-2xl p-5 transition-all text-center group">
                                    <i class="ph-duotone ph-buildings text-4xl mb-3 text-indigo-400 group-hover:text-indigo-600 transition group-hover:scale-110 duration-300"></i><br>
                                    <span class="font-extrabold text-slate-900">Client</span>
                                    <p class="text-[11px] text-slate-500 mt-1 font-medium">Hire talent</p>
                                </button>
                                <button onclick="login('freelancer')" class="bg-white border-2 border-slate-100 hover:border-emerald-500 hover:shadow-md text-slate-700 rounded-2xl p-5 transition-all text-center group">
                                    <i class="ph-duotone ph-laptop text-4xl mb-3 text-emerald-400 group-hover:text-emerald-600 transition group-hover:scale-110 duration-300"></i><br>
                                    <span class="font-extrabold text-slate-900">Freelancer</span>
                                    <p class="text-[11px] text-slate-500 mt-1 font-medium">Find work</p>
                                </button>
                            </div>
                            <button onclick="login('admin')" class="w-full text-xs text-slate-400 hover:text-slate-800 underline mt-4 font-medium transition">Secure Login as Platform Admin</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- DASHBOARDS ---

        function renderClientDashboard() {
            const myProjects = state.projects.filter(p => p.clientId === state.user.id).sort((a,b) => b.timestamp - a.timestamp);
            const openProjects = myProjects.filter(p => p.status === 'open');
            const activeProjects = myProjects.filter(p => p.status === 'in_progress');

            let projectListHtml = myProjects.map(p => {
                const bidsCount = state.bids.filter(b => b.projectId === p.id).length;
                let statusUI = '';
                let actionBtn = '';
                
                if(p.status === 'open') {
                    statusUI = `<span class="bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded-md text-[10px] font-extrabold uppercase tracking-widest shadow-sm">Bidding Open</span>`;
                    actionBtn = `<button onclick="navigate('project_details', '${p.id}')" class="text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg font-bold text-sm transition">View Bids (${bidsCount})</button>`;
                } else if(p.status === 'in_progress') {
                    statusUI = `<span class="bg-amber-50 text-amber-700 border border-amber-200 px-2 py-1 rounded-md text-[10px] font-extrabold uppercase tracking-widest shadow-sm">In Progress</span>`;
                    actionBtn = `<button onclick="navigate('workspace', '${p.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md hover:shadow-lg transition transform hover:-translate-y-0.5">Open Workspace</button>`;
                } else if(p.status === 'completed') {
                    statusUI = `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1 rounded-md text-[10px] font-extrabold uppercase tracking-widest shadow-sm">Completed</span>`;
                    actionBtn = `<button onclick="navigate('workspace', '${p.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-4 py-2 rounded-xl text-sm transition">View Archive</button>`;
                }

                return `
                    <div class="p-6 border-b border-slate-100 hover:bg-slate-50/50 flex flex-col md:flex-row md:items-center justify-between gap-4 transition duration-300">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="font-extrabold text-lg text-slate-900 cursor-pointer hover:text-indigo-600 transition" onclick="navigate('project_details', '${p.id}')">${p.title}</h3>
                                ${statusUI}
                            </div>
                            <p class="text-sm text-slate-500 line-clamp-1 mb-2">${p.desc}</p>
                            <div class="text-xs text-slate-400 font-semibold flex gap-4">
                                <span><i class="ph-bold ph-calendar-blank mr-1"></i>${new Date(p.timestamp).toLocaleDateString()}</span>
                                <span><i class="ph-bold ph-wallet mr-1"></i>${formatINR(p.minBudget)} - ${formatINR(p.maxBudget)}</span>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            ${actionBtn}
                        </div>
                    </div>
                `;
            }).join('');

            if(myProjects.length === 0) projectListHtml = `<div class="p-16 text-center text-slate-500 bg-slate-50/50 rounded-b-2xl"><i class="ph-duotone ph-folder-open text-6xl text-slate-300 mb-4 drop-shadow-sm"></i><p class="font-medium text-lg">You haven't posted any projects yet.</p><button onclick="navigate('post_project')" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition">Post your first project</button></div>`;

            container.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-8 animate-fade-in">
                    <!-- Sidebar -->
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center text-3xl font-extrabold text-white mb-4 shadow-lg mx-auto">${state.user.name.charAt(0)}</div>
                            <h2 class="text-xl font-extrabold text-slate-900">${state.user.name}</h2>
                            <p class="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-6">Client Account</p>
                            <button onclick="navigate('post_project')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-md hover:shadow-lg">Post a New Project</button>
                        </div>
                        
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <h3 class="font-bold text-slate-400 mb-4 uppercase text-xs tracking-widest border-b border-slate-100 pb-2">Activity Overview</h3>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-slate-600 font-semibold text-sm flex items-center"><i class="ph-fill ph-push-pin text-blue-500 mr-2"></i> Open Projects</span>
                                <span class="bg-slate-100 text-slate-800 px-2.5 py-1 rounded-lg text-xs font-bold shadow-inner">${openProjects.length}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-slate-600 font-semibold text-sm flex items-center"><i class="ph-fill ph-briefcase text-amber-500 mr-2"></i> Active Work</span>
                                <span class="bg-amber-50 text-amber-700 px-2.5 py-1 rounded-lg text-xs font-bold border border-amber-100">${activeProjects.length}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Main Feed -->
                    <div class="lg:col-span-3">
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div class="p-6 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                <h2 class="text-xl font-extrabold text-slate-800">My Workspace Projects</h2>
                            </div>
                            <div class="divide-y divide-slate-100">
                                ${projectListHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFreelancerDashboard() {
            const myBids = state.bids.filter(b => b.freelancerId === state.user.id);
            const activeBids = myBids.filter(b => {
                const proj = state.projects.find(p => p.id === b.projectId);
                return proj && proj.status === 'open';
            });

            const myWork = state.projects.filter(p => p.awardedTo === state.user.id && p.status === 'in_progress');
            
            // Calculate potential earnings from active escrow
            let pendingEarnings = 0;
            state.milestones.forEach(m => {
                if(m.status !== 'released') {
                    const p = state.projects.find(proj => proj.id === m.projectId);
                    if(p && p.awardedTo === state.user.id) {
                        pendingEarnings += m.amount;
                    }
                }
            });

            let workHtml = myWork.map(p => `
                <div class="p-5 border border-slate-200 rounded-xl mb-4 hover:border-indigo-400 hover:shadow-md transition bg-white flex justify-between items-center group">
                    <div>
                        <h4 class="font-bold text-slate-900 group-hover:text-indigo-600 transition">${p.title}</h4>
                        <p class="text-xs text-slate-500 mt-1 font-medium flex items-center"><i class="ph-fill ph-user mr-1"></i> Client: ${p.clientName}</p>
                    </div>
                    <button onclick="navigate('workspace', '${p.id}')" class="bg-indigo-50 hover:bg-indigo-600 text-indigo-700 hover:text-white px-5 py-2.5 rounded-xl text-sm font-bold transition shadow-sm border border-indigo-100 hover:border-indigo-600">Enter Workspace</button>
                </div>
            `).join('');
            if(myWork.length===0) workHtml = `<div class="p-8 text-center bg-slate-50 rounded-xl border border-dashed border-slate-300"><i class="ph-duotone ph-coffee text-4xl text-slate-300 mb-2"></i><p class="text-sm font-medium text-slate-500">No active projects currently.</p></div>`;

            let bidsHtml = activeBids.map(b => {
                const p = state.projects.find(proj => proj.id === b.projectId);
                if(!p) return '';
                return `
                <div class="p-4 border-b border-slate-100 hover:bg-slate-50 transition cursor-pointer" onclick="navigate('project_details', '${p.id}')">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-semibold text-slate-800 text-sm truncate pr-4">${p.title}</h4>
                        <span class="font-extrabold text-indigo-600 whitespace-nowrap bg-indigo-50 px-2 py-0.5 rounded">${formatINR(b.amount)}</span>
                    </div>
                    <p class="text-[11px] font-medium text-slate-400">Bid placed ${Math.round((Date.now()-b.timestamp)/60000)} mins ago</p>
                </div>
                `;
            }).join('');
            if(activeBids.length===0) bidsHtml = `<p class="text-sm text-slate-500 p-6 text-center font-medium">No active bids right now.</p>`;

            container.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-8 animate-fade-in">
                    <!-- Sidebar -->
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                            <div class="w-24 h-24 rounded-full bg-gradient-to-br from-emerald-400 to-teal-600 text-white flex items-center justify-center text-4xl font-extrabold mx-auto mb-4 shadow-xl border-4 border-white">${state.user.name.charAt(0)}</div>
                            <h2 class="text-xl font-extrabold text-slate-900">${state.user.name}</h2>
                            <p class="text-xs text-emerald-600 font-bold uppercase tracking-widest mb-4">Available for Hire</p>
                            <div class="flex flex-wrap gap-2 justify-center mt-4">
                                ${state.user.skills ? state.user.skills.map(s => `<span class="px-2.5 py-1 bg-slate-100 text-slate-700 text-[10px] font-extrabold uppercase rounded-lg border border-slate-200 shadow-sm">${s}</span>`).join('') : '<span class="text-xs text-slate-400">No skills set</span>'}
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                                <h3 class="font-bold text-slate-800 text-sm">Active Bids</h3>

        function submitProject() {
            const title = document.getElementById('post-title').value.trim();
            const desc = document.getElementById('post-desc').value.trim();
            const minB = parseInt(document.getElementById('post-min').value);
            const maxB = parseInt(document.getElementById('post-max').value);
            
            const checkboxes = document.querySelectorAll('input[name="project_skills"]:checked');
            const skills = Array.from(checkboxes).map(cb => cb.value);

            if(!title || !desc || isNaN(minB) || isNaN(maxB) || skills.length === 0) {
                alert("Please fill all fields and select at least one skill.");
                return;
            }

            const p = {
                id: 'p_' + Date.now(),
                clientId: state.user.id,
                clientName: state.user.name,
                title, desc, skills,
                minBudget: minB, maxBudget: maxB,
                status: 'open',
                timestamp: Date.now()
            };

            state.projects.push(p);
            navigate('dashboard');
        }

        function processPayment(projectId, bidId, totalPaid, escrowAmount, gatewayFee) {
            const pIdx = state.projects.findIndex(p => p.id === projectId);
            const bid = state.bids.find(b => b.id === bidId);
            
            if(state.user.balance < totalPaid) {
                alert(`Insufficient wallet balance! You have ${formatINR(state.user.balance)}, need ${formatINR(totalPaid)}.`);
                return;
            }

            // Deduct from client
            state.user.balance -= totalPaid;
            
            // Add gateway fee immediately to platform revenue
            state.platformRevenue += gatewayFee;

            // Update Project
            state.projects[pIdx].status = 'in_progress';
            state.projects[pIdx].awardedTo = bid.freelancerId;
            state.projects[pIdx].awardedBidAmount = escrowAmount;

            // Create Escrow Milestone
            state.milestones.push({
                id: 'm_' + Date.now(),
                projectId: projectId,
                amount: escrowAmount, // Note: Freelancer gets 80% of this later.
                status: 'funded', // funded -> delivered -> approved -> released
                timestamp: Date.now()
            });

            // Initialize Chat
            state.messages.push({
                id: 'msg_' + Date.now(),
                chatId: projectId,
                senderId: 'system',
                text: `🚀 Project Awarded! ${formatINR(escrowAmount)} has been securely funded in Escrow. Freelancer, you may begin working.`,
                timestamp: Date.now()
            });

            saveData();
            alert("Payment Successful! Funds secured in Escrow.");
            navigate('workspace', projectId);
        }

                        <div class="p-6 bg-slate-50 border-b border-slate-200"><h3 class="font-extrabold text-slate-800 uppercase tracking-wider text-sm">Escrow Management</h3></div>

                                </thead>

                                    ${ordersHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function adminReleaseFunds(milestoneId) {
            if(!confirm("Release funds? This deducts 20% platform fee and sends the rest to the freelancer.")) return;
            
            const mIdx = state.milestones.findIndex(m => m.id === milestoneId);
            const m = state.milestones[mIdx];
            
            // Calculate fees
            const platformFee = m.amount * PLATFORM_FEE_PERCENT;
            const freelancerPayout = m.amount - platformFee;

            // Update Milestone
            m.status = 'released';

            // Add fee to admin revenue
            state.platformRevenue += platformFee;

            // Give money to freelancer
            const proj = state.projects.find(p => p.id === m.projectId);
            const freeIdx = state.users.findIndex(u => u.id === proj.awardedTo);
            if(freeIdx > -1) {
                state.users[freeIdx].balance = (state.users[freeIdx].balance || 0) + freelancerPayout;
            }

            state.messages.push({
                id: 'msg_' + Date.now(), chatId: m.projectId, senderId: 'system',
                text: `💸 Admin released payment. Freelancer received ${formatINR(freelancerPayout)} (After 20% fee). Project Complete!`, timestamp: Date.now()
            });

            saveData();
            renderAdmin();
        }
