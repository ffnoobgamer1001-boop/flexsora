<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexsora Pro - Freelance Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 2px solid #2563eb; color: #1e40af; font-weight: 600; }
        .tab-inactive { color: #64748b; font-weight: 500; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #0f172a; border-bottom: 2px solid #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="glass-nav shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all" id="navbar">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo & Primary Links -->
                <div class="flex items-center">
                    <div class="flex items-center cursor-pointer mr-8" onclick="navigate('home')">
                        <i class="ph-fill ph-hexagon text-3xl text-blue-600 mr-2"></i>
                        <span class="font-bold text-2xl text-slate-900 tracking-tight">Flexsora</span>
                    </div>
                    
                    <div class="hidden md:flex space-x-1" id="nav-links">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- User Actions & Profile -->
                <div class="flex items-center space-x-4" id="nav-actions">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow flex flex-col w-full max-w-[1400px] mx-auto p-4 sm:p-6 lg:p-8"></main>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT (V2 Architecture)
        // ==========================================
        let state = {
            user: null, 
            users: [], 
            projects: [], 
            bids: [], 
            messages: [],
            milestones: [],
            
            // View State
            currentView: 'home',
            viewData: null, // Holds ID of selected project, etc.
            
            // Filter State
            browseFilters: { search: '', skill: 'All', status: 'open' }
        };

        const SKILLS = ['Web Development', 'Mobile Apps', 'Graphic Design', 'Video Editing', 'Writing', 'Data Entry'];

        // Initial Seed Data to make the prototype look alive
        const seedData = () => {
            const u1 = { id: 'c_john', name: 'John Tech', role: 'client', balance: 5000 };
            const u2 = { id: 'f_alice', name: 'Alice Dev', role: 'freelancer', balance: 0, skills: ['Web Development', 'Mobile Apps'] };
            state.users = [u1, u2];

            const p1 = {
                id: 'p_101', clientId: 'c_john', clientName: 'John Tech',
                title: 'Build a React E-commerce Frontend',
                desc: 'Looking for an experienced React developer to build a responsive storefront. Must have experience with Tailwind and Redux. API is already built.',
                skills: ['Web Development'], minBudget: 500, maxBudget: 1500,
                status: 'open', timestamp: Date.now() - 86400000
            };
            const p2 = {
                id: 'p_102', clientId: 'c_john', clientName: 'John Tech',
                title: 'Design a Modern Tech Logo',
                desc: 'Need a sleek, minimal logo for a new AI startup. Deliverables in SVG and PNG.',
                skills: ['Graphic Design'], minBudget: 50, maxBudget: 200,
                status: 'open', timestamp: Date.now() - 3600000
            };
            state.projects = [p1, p2];

            state.bids = [{
                id: 'b_201', projectId: 'p_101', freelancerId: 'f_alice', freelancerName: 'Alice Dev',
                amount: 1200, days: 14, proposal: 'I have built 5 e-commerce sites using React and Tailwind. I can complete this within 2 weeks.', timestamp: Date.now() - 4000000
            }];
        };

        function loadData() {
            const savedUser = localStorage.getItem('fx_v2_user');
            if (savedUser) {
                state.user = JSON.parse(savedUser);
                state.users = JSON.parse(localStorage.getItem('fx_v2_users')) || [];
                state.projects = JSON.parse(localStorage.getItem('fx_v2_projects')) || [];
                state.bids = JSON.parse(localStorage.getItem('fx_v2_bids')) || [];
                state.messages = JSON.parse(localStorage.getItem('fx_v2_messages')) || [];
                state.milestones = JSON.parse(localStorage.getItem('fx_v2_milestones')) || [];
            } else {
                seedData(); // First time visit
            }
        }

        function saveData() {
            if(!state.user) return;
            localStorage.setItem('fx_v2_user', JSON.stringify(state.user));
            localStorage.setItem('fx_v2_users', JSON.stringify(state.users));
            localStorage.setItem('fx_v2_projects', JSON.stringify(state.projects));
            localStorage.setItem('fx_v2_bids', JSON.stringify(state.bids));
            localStorage.setItem('fx_v2_messages', JSON.stringify(state.messages));
            localStorage.setItem('fx_v2_milestones', JSON.stringify(state.milestones));
        }

        // ==========================================
        // 2. ROUTING & NAVIGATION
        // ==========================================
        const container = document.getElementById('app-container');

        function navigate(view, data = null) {
            state.currentView = view;
            state.viewData = data;
            saveData();
            
            if (!state.user && view !== 'home' && view !== 'login') {
                view = 'login';
            }

            updateNavbar();

            container.innerHTML = '';
            window.scrollTo(0, 0);

            if (view === 'home') renderHome();
            else if (view === 'login') renderLogin();
            else if (view === 'dashboard') state.user.role === 'client' ? renderClientDashboard() : renderFreelancerDashboard();
            else if (view === 'browse') renderBrowseProjects();
            else if (view === 'post_project') renderPostProject();
            else if (view === 'project_details') renderProjectDetails(data);
            else if (view === 'workspace') renderWorkspace(data);
            else if (view === 'admin') renderAdmin();
        }

        function updateNavbar() {
            const navLinks = document.getElementById('nav-links');
            const navActions = document.getElementById('nav-actions');

            if (!state.user) {
                navLinks.innerHTML = `<button onclick="navigate('browse')" class="px-3 py-2 text-slate-600 hover:text-slate-900 font-medium">Browse Projects</button>`;
                navActions.innerHTML = `
                    <button onclick="navigate('login')" class="text-slate-600 font-medium hover:text-slate-900 mr-2">Log In</button>
                    <button onclick="navigate('login')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">Sign Up</button>
                `;
                return;
            }

            // Links based on role
            let links = `<button onclick="navigate('dashboard')" class="px-4 py-2 rounded-lg ${state.currentView === 'dashboard' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50'} font-medium transition">Dashboard</button>`;
            
            if (state.user.role === 'client') {
                links += `
                    <button onclick="navigate('post_project')" class="px-4 py-2 rounded-lg ${state.currentView === 'post_project' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50'} font-medium transition">Post a Project</button>
                    <button onclick="navigate('browse')" class="px-4 py-2 rounded-lg ${state.currentView === 'browse' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50'} font-medium transition">Find Freelancers</button>
                `;
            } else if (state.user.role === 'freelancer') {
                links += `
                    <button onclick="navigate('browse')" class="px-4 py-2 rounded-lg ${state.currentView === 'browse' ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50'} font-medium transition">Browse Projects</button>
                `;
            } else if (state.user.role === 'admin') {
                links += `<button onclick="navigate('admin')" class="px-4 py-2 rounded-lg bg-slate-100 text-slate-900 font-medium">System Admin</button>`;
            }

            navLinks.innerHTML = links;

            // Actions (Profile, Notifications, Balance)
            let balanceBadge = state.user.role !== 'admin' ? 
                `<div class="hidden sm:flex items-center bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 mr-2 cursor-help" title="Account Balance">
                    <i class="ph-bold ph-wallet text-slate-500 mr-2"></i>
                    <span class="font-bold text-slate-700">$${state.user.balance || 0}</span>
                </div>` : '';

            navActions.innerHTML = `
                ${balanceBadge}
                <button class="p-2 text-slate-400 hover:text-blue-600 transition relative">
                    <i class="ph-fill ph-bell text-2xl"></i>
                    <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                <div class="h-8 w-px bg-slate-200 mx-2"></div>
                <div class="flex items-center cursor-pointer group">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-600 to-indigo-700 text-white flex items-center justify-center font-bold text-sm shadow-sm">
                        ${state.user.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="ml-2 hidden sm:block">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${state.user.name}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-wider">${state.user.role}</p>
                    </div>
                </div>
                <button onclick="logout()" class="ml-4 p-2 text-slate-400 hover:text-red-500 transition" title="Logout">
                    <i class="ph-bold ph-sign-out text-xl"></i>
                </button>
            `;
        }

        // ==========================================
        // 3. AUTHENTICATION LOGIC (Login/Logout)
        // ==========================================

        function login(role) {
            let nameInput = document.getElementById('login-name').value.trim();
            if (role === 'admin') nameInput = 'System Admin'; // Auto-name for admin
            
            if (!nameInput && role !== 'admin') {
                alert("Please enter a name for testing.");
                return;
            }
            
            // Generate a fake ID based on name to keep it consistent
            const id = role.charAt(0) + '_' + nameInput.toLowerCase().replace(/\s+/g, '') + '_' + Math.floor(Math.random()*1000);
            
            // Give client some starting funds to test escrow, assign random skill to freelancer
            const startBalance = role === 'client' ? 5000 : 0;
            const startSkills = role === 'freelancer' ? [SKILLS[Math.floor(Math.random() * SKILLS.length)]] : [];
            
            state.user = { id: id, name: nameInput, role: role, balance: startBalance, skills: startSkills };
            
            // Register user in mock DB if not exists
            if (!state.users.find(u => u.name === nameInput && u.role === role)) {
                state.users.push(state.user);
            }

            navigate(role === 'admin' ? 'admin' : 'dashboard');
        }

        function logout() {
            state.user = null;
            // Clear current active session in localStorage
            localStorage.removeItem('fx_v2_user');
            navigate('home');
        }

        // ==========================================
        // 4. UI GENERATORS
        // ==========================================

        function renderLogin() {
            container.innerHTML = `
                <div class="flex-grow flex items-center justify-center py-12">
                    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
                        <div class="p-8 text-center bg-slate-900 text-white relative overflow-hidden">
                            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-blue-500 opacity-20 blur-2xl"></div>
                            <i class="ph-fill ph-hexagon text-5xl text-blue-400 mb-4"></i>
                            <h2 class="text-3xl font-bold">Welcome Back</h2>
                            <p class="text-slate-400 text-sm mt-2">Sign in to your prototype account</p>
                        </div>
                        <div class="p-8">
                            <input type="text" id="login-name" placeholder="Full Name" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                            <p class="text-sm font-semibold text-slate-600 mb-3">Select your account type:</p>
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <button onclick="login('client')" class="border border-slate-200 hover:border-blue-500 hover:bg-blue-50 text-slate-700 rounded-lg p-4 transition-all text-center group">
                                    <i class="ph-duotone ph-buildings text-3xl mb-2 text-slate-400 group-hover:text-blue-600 transition"></i><br>
                                    <span class="font-bold">Client</span>
                                    <p class="text-[10px] text-slate-400 mt-1">Hire talent</p>
                                </button>
                                <button onclick="login('freelancer')" class="border border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 text-slate-700 rounded-lg p-4 transition-all text-center group">
                                    <i class="ph-duotone ph-laptop text-3xl mb-2 text-slate-400 group-hover:text-emerald-600 transition"></i><br>
                                    <span class="font-bold">Freelancer</span>
                                    <p class="text-[10px] text-slate-400 mt-1">Find work</p>
                                </button>
                            </div>
                            <button onclick="login('admin')" class="w-full text-xs text-slate-400 hover:text-slate-800 underline mt-4">Login as Platform Admin</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- DASHBOARDS ---

        function renderClientDashboard() {
            const myProjects = state.projects.filter(p => p.clientId === state.user.id).sort((a,b) => b.timestamp - a.timestamp);
            const openProjects = myProjects.filter(p => p.status === 'open');
            const activeProjects = myProjects.filter(p => p.status === 'in_progress');

            let projectListHtml = myProjects.map(p => {
                const bidsCount = state.bids.filter(b => b.projectId === p.id).length;
                let statusUI = '';
                let actionBtn = '';
                
                if(p.status === 'open') {
                    statusUI = `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">Open for Bidding</span>`;
                    actionBtn = `<button onclick="navigate('project_details', '${p.id}')" class="text-blue-600 hover:underline font-medium text-sm">View Bids (${bidsCount})</button>`;
                } else if(p.status === 'in_progress') {
                    statusUI = `<span class="bg-amber-100 text-amber-800 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">In Progress</span>`;
                    actionBtn = `<button onclick="navigate('workspace', '${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition">Open Workspace</button>`;
                } else if(p.status === 'completed') {
                    statusUI = `<span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold uppercase tracking-wider">Completed</span>`;
                    actionBtn = `<button onclick="navigate('workspace', '${p.id}')" class="text-slate-500 hover:text-slate-800 font-medium text-sm">View Archive</button>`;
                }

                return `
                    <div class="p-5 border-b border-slate-100 hover:bg-slate-50 flex flex-col md:flex-row md:items-center justify-between gap-4 transition">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="font-bold text-lg text-slate-900 cursor-pointer hover:text-blue-600" onclick="navigate('project_details', '${p.id}')">${p.title}</h3>
                                ${statusUI}
                            </div>
                            <p class="text-sm text-slate-500 line-clamp-1">${p.desc}</p>
                            <div class="mt-2 text-xs text-slate-400 font-medium">Posted: ${new Date(p.timestamp).toLocaleDateString()} • Budget: $${p.minBudget} - $${p.maxBudget}</div>
                        </div>
                        <div class="flex-shrink-0">
                            ${actionBtn}
                        </div>
                    </div>
                `;
            }).join('');

            if(myProjects.length === 0) projectListHtml = `<div class="p-12 text-center text-slate-500"><i class="ph-duotone ph-folder-open text-5xl text-slate-300 mb-3"></i><p>You haven't posted any projects yet.</p><button onclick="navigate('post_project')" class="mt-4 text-blue-600 font-medium hover:underline">Post your first project</button></div>`;

            container.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-8">
                    <!-- Sidebar -->
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center text-2xl font-bold text-slate-700 mb-4 shadow-inner border border-slate-200">${state.user.name.charAt(0)}</div>
                            <h2 class="text-xl font-bold text-slate-900">${state.user.name}</h2>
                            <p class="text-sm text-slate-500 mb-4">Client Account</p>
                            <button onclick="navigate('post_project')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-sm">Post a Project</button>
                        </div>
                        
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-4 uppercase text-xs tracking-wider">Overview</h3>
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-slate-600 text-sm">Open Projects</span>
                                <span class="bg-slate-100 text-slate-800 px-2 py-0.5 rounded text-xs font-bold">${openProjects.length}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-slate-600 text-sm">Active Work</span>
                                <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">${activeProjects.length}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Main Feed -->
                    <div class="lg:col-span-3">
                        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div class="p-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                                <h2 class="text-lg font-bold text-slate-800">My Projects</h2>
                            </div>
                            <div class="divide-y divide-slate-100">
                                ${projectListHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFreelancerDashboard() {
            // Find active bids
            const myBids = state.bids.filter(b => b.freelancerId === state.user.id);
            const activeBids = myBids.filter(b => {
                const proj = state.projects.find(p => p.id === b.projectId);
                return proj && proj.status === 'open';
            });

            // Find current work
            const myWork = state.projects.filter(p => p.awardedTo === state.user.id && p.status === 'in_progress');

            let workHtml = myWork.map(p => `
                <div class="p-4 border border-slate-200 rounded-lg mb-3 hover:border-blue-400 transition bg-white flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-slate-900">${p.title}</h4>
                        <p class="text-xs text-slate-500 mt-1">Client: ${p.clientName}</p>
                    </div>
                    <button onclick="navigate('workspace', '${p.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-800 px-4 py-2 rounded-lg text-sm font-medium transition">Workspace</button>
                </div>
            `).join('');
            if(myWork.length===0) workHtml = `<p class="text-sm text-slate-500 p-4 bg-slate-50 rounded-lg border border-dashed border-slate-300">No active projects currently.</p>`;

            let bidsHtml = activeBids.map(b => {
                const p = state.projects.find(proj => proj.id === b.projectId);
                if(!p) return '';
                return `
                <div class="p-4 border-b border-slate-100 hover:bg-slate-50 transition cursor-pointer" onclick="navigate('project_details', '${p.id}')">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-semibold text-slate-800 truncate pr-4">${p.title}</h4>
                        <span class="font-bold text-blue-600 whitespace-nowrap">$${b.amount}</span>
                    </div>
                    <p class="text-xs text-slate-400">Bid placed ${Math.round((Date.now()-b.timestamp)/60000)} mins ago</p>
                </div>
                `;
            }).join('');
            if(activeBids.length===0) bidsHtml = `<p class="text-sm text-slate-500 p-4">No active bids.</p>`;


            container.innerHTML = `
                <div class="grid lg:grid-cols-4 gap-8">
                    <!-- Sidebar -->
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-center">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 text-white flex items-center justify-center text-3xl font-bold mx-auto mb-4 shadow-lg">${state.user.name.charAt(0)}</div>
                            <h2 class="text-xl font-bold text-slate-900">${state.user.name}</h2>
                            <p class="text-sm text-emerald-600 font-medium mb-4">Available for Work</p>
                            <div class="flex flex-wrap gap-2 justify-center mt-4">
                                ${state.user.skills ? state.user.skills.map(s => `<span class="px-2 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase rounded border border-slate-200">${s}</span>`).join('') : '<span class="text-xs text-slate-400">No skills set</span>'}
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div class="bg-slate-50 px-4 py-3 border-b border-slate-200"><h3 class="font-bold text-slate-800 text-sm">Active Bids (${activeBids.length})</h3></div>
                            <div class="max-h-[300px] overflow-y-auto">
                                ${bidsHtml}
                            </div>
                        </div>
                    </div>

                    <!-- Main Feed -->
                    <div class="lg:col-span-3 space-y-6">
                        <!-- Stat Cards -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-slate-500">Available Balance</p>
                                    <h3 class="text-2xl font-bold text-slate-900">$${state.user.balance || 0}</h3>
                                </div>
                                <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center"><i class="ph-duotone ph-currency-dollar text-2xl text-emerald-600"></i></div>
                            </div>
                            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-slate-500">Jobs Completed</p>
                                    <h3 class="text-2xl font-bold text-slate-900">0</h3>
                                </div>
                                <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center"><i class="ph-duotone ph-check-circle text-2xl text-blue-600"></i></div>
                            </div>
                        </div>

                        <!-- Current Work -->
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Current Work & Escrow</h2>
                            ${workHtml}
                        </div>
                        
                        <!-- CTA -->
                        <div class="bg-gradient-to-r from-slate-900 to-blue-900 rounded-xl p-8 text-white flex justify-between items-center shadow-lg">
                            <div>
                                <h3 class="text-xl font-bold mb-1">Find your next client</h3>
                                <p class="text-blue-200 text-sm">Browse thousands of new projects posted today.</p>
                            </div>
                            <button onclick="navigate('browse')" class="bg-white text-blue-900 font-bold px-6 py-3 rounded-lg hover:bg-slate-100 transition shadow">Browse Projects</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- BROWSE PROJECTS ---
        function renderBrowseProjects() {
            // Apply Filters
            let filtered = state.projects.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(state.browseFilters.search.toLowerCase());

        function submitProject() {
            const title = document.getElementById('post-title').value.trim();
            const desc = document.getElementById('post-desc').value.trim();
            const minB = parseInt(document.getElementById('post-min').value);
            const maxB = parseInt(document.getElementById('post-max').value);
            
            const checkboxes = document.querySelectorAll('input[name="project_skills"]:checked');
            const skills = Array.from(checkboxes).map(cb => cb.value);

            if(!title || !desc || isNaN(minB) || isNaN(maxB) || skills.length === 0) {
                alert("Please fill all fields and select at least one skill.");
                return;
            }

            const p = {
                id: 'p_' + Date.now(),
                clientId: state.user.id,
                clientName: state.user.name,
                title, desc, skills,
                minBudget: minB, maxBudget: maxB,
                status: 'open',
                timestamp: Date.now()
            };

            state.projects.push(p);
            navigate('dashboard');
        }

        function placeBid(projectId) {
            const amount = parseInt(document.getElementById('bid-amount').value);
            const days = parseInt(document.getElementById('bid-days').value);
            const prop = document.getElementById('bid-prop').value.trim();

            if(!amount || !days || !prop) { alert("Fill all bid details."); return; }

            state.bids.push({
                id: 'b_' + Date.now(),
                projectId,
                freelancerId: state.user.id,
                freelancerName: state.user.name,
                amount, days, proposal: prop,
                timestamp: Date.now()
            });
            renderProjectDetails(projectId);
        }

        function awardProject(projectId, bidId) {
            if(!confirm("Are you sure you want to award the project to this freelancer? This will create an Escrow Milestone.")) return;

            const pIdx = state.projects.findIndex(p => p.id === projectId);
            const bid = state.bids.find(b => b.id === bidId);
            
            // Check Client Balance
            if(state.user.balance < bid.amount) {
                alert(`Insufficient balance! You have $${state.user.balance}, but need $${bid.amount} to fund escrow.`);
                return;
            }

            // Deduct balance and update project
            state.user.balance -= bid.amount;
            state.projects[pIdx].status = 'in_progress';
            state.projects[pIdx].awardedTo = bid.freelancerId;
            state.projects[pIdx].awardedBidAmount = bid.amount; // Store agreed amount

            // Create Milestone (Funded Escrow)
            state.milestones.push({
                id: 'm_' + Date.now(),
                projectId: projectId,
                amount: bid.amount,
                status: 'funded', // funded -> requested -> released
                timestamp: Date.now()
            });

            // Initialize chat
            const chatId = projectId; // Use project ID as chat room ID
            state.messages.push({
                id: 'msg_' + Date.now(),
                chatId: chatId,
                senderId: 'system',
                text: `Project awarded to ${bid.freelancerName} for $${bid.amount}. Milestone funded in Escrow.`,
                timestamp: Date.now()
            });

            saveData();
            navigate('workspace', projectId);
        }

                            </div>
                            <div class="p-4 overflow-y-auto flex-1">
                                ${milestoneHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const chatBox = document.getElementById('workspace-chat');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendWsMsg(projectId) {
            const input = document.getElementById('ws-chat-input');
            const text = input.value.trim();
            if(!text) return;
            state.messages.push({
                id: 'msg_' + Date.now(), chatId: projectId, senderId: state.user.id, text, timestamp: Date.now()
            });
            renderWorkspace(projectId);
        }

        function requestRelease(milestoneId) {
            const mIdx = state.milestones.findIndex(m => m.id === milestoneId);
            state.milestones[mIdx].status = 'requested';
            
            state.messages.push({
                id: 'msg_' + Date.now(), chatId: state.milestones[mIdx].projectId, senderId: 'system',
                text: `Freelancer has requested release of $${state.milestones[mIdx].amount} milestone. Client review required.`, timestamp: Date.now()
            });
            renderWorkspace(state.milestones[mIdx].projectId);
        }

        function releaseMilestone(milestoneId) {
            if(!confirm("Release funds to Freelancer? This cannot be undone.")) return;
            const mIdx = state.milestones.findIndex(m => m.id === milestoneId);
            const m = state.milestones[mIdx];
            m.status = 'released';

            // Find freelancer and update balance
            const proj = state.projects.find(p => p.id === m.projectId);
            const freeIdx = state.users.findIndex(u => u.id === proj.awardedTo);
            if(freeIdx > -1) {
                state.users[freeIdx].balance = (state.users[freeIdx].balance || 0) + m.amount;
                // If the user is currently logged in, update session state too
                if(state.user.id === state.users[freeIdx].id) state.user.balance += m.amount;
            }

            state.messages.push({
                id: 'msg_' + Date.now(), chatId: m.projectId, senderId: 'system',
                text: `✅ Milestone of $${m.amount} released to Freelancer!`, timestamp: Date.now()
            });
            renderWorkspace(m.projectId);
        }

        function markCompleted(projectId) {
            if(!confirm("Close project? Ensure all milestones are released.")) return;
            const pIdx = state.projects.findIndex(p => p.id === projectId);
            state.projects[pIdx].status = 'completed';
            navigate('dashboard');
        }


        // --- ADMIN VIEW ---
        function renderAdmin() {
            const totalProj = state.projects.length;
            const totalEscrow = state.milestones.filter(m=>m.status!=='released').reduce((s,m)=>s+m.amount,0);
            const releasedFunds = state.milestones.filter(m=>m.status==='released').reduce((s,m)=>s+m.amount,0);

            container.innerHTML = `
                <div class="max-w-6xl mx-auto w-full space-y-8">
                    <div class="bg-slate-900 p-8 rounded-2xl text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h1 class="text-3xl font-bold mb-1"><i class="ph-fill ph-shield-check text-blue-400 mr-2"></i>Platform Admin</h1>
                            <p class="text-slate-400">System overview and financial metrics.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-blue-500">
                            <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Total Projects</p>
                            <h2 class="text-3xl font-extrabold text-slate-900">${totalProj}</h2>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-amber-500">
                            <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Funds in Escrow</p>
                            <h2 class="text-3xl font-extrabold text-slate-900">$${totalEscrow}</h2>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-emerald-500">
                            <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Funds Paid Out</p>
                            <h2 class="text-3xl font-extrabold text-slate-900">$${releasedFunds}</h2>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b border-slate-200"><h3 class="font-bold text-slate-800">Registered Users (${state.users.length})</h3></div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-white text-slate-500 border-b border-slate-100">
                                <tr><th class="p-4 font-semibold">User</th><th class="p-4 font-semibold">Role</th><th class="p-4 font-semibold text-right">System Balance</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${state.users.map(u => `
                                    <tr class="hover:bg-slate-50">
                                        <td class="p-4 font-medium text-slate-900">${u.name}</td>
                                        <td class="p-4 uppercase text-xs tracking-wider font-bold text-slate-500">${u.role}</td>
                                        <td class="p-4 text-right font-bold text-slate-700">$${u.balance || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // --- HOME / LANDING ---
        function renderHome() {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-center max-w-4xl mx-auto">
                    <div class="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 border border-blue-100 text-blue-700 text-xs font-bold uppercase tracking-wider mb-8 shadow-sm">
                        <span class="w-2 h-2 rounded-full bg-blue-500 mr-2 animate-pulse"></span> Prototype V2 Active
                    </div>
                    <h1 class="text-5xl sm:text-6xl font-extrabold text-slate-900 tracking-tight leading-tight mb-6">
                        Hire the best freelancers for any job, <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">online.</span>
                    </h1>
                    <p class="text-lg sm:text-xl text-slate-500 mb-10 max-w-2xl leading-relaxed">
                        Millions of people use Flexsora to turn their ideas into reality. From web design to video editing, find the perfect talent for your budget.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                        <button onclick="navigate('login')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg px-8 py-4 rounded-xl shadow-lg hover:shadow-xl transition transform hover:-translate-y-1 w-full sm:w-auto">Hire a Freelancer</button>
                        <button onclick="navigate('login')" class="bg-white border-2 border-slate-200 hover:border-slate-300 text-slate-800 font-bold text-lg px-8 py-4 rounded-xl shadow-sm transition w-full sm:w-auto">Earn Money Freelancing</button>
                    </div>
                    
                    <div class="mt-20 pt-10 border-t border-slate-200 w-full grid grid-cols-2 sm:grid-cols-4 gap-8 opacity-60 grayscale hover:grayscale-0 transition duration-500">
                        <!-- Mock logos -->
                        <div class="text-2xl font-black font-serif text-slate-400">AMAZON</div>
                        <div class="text-2xl font-black font-sans text-slate-400 tracking-tighter">FACEBOOK</div>
                        <div class="text-2xl font-black font-mono text-slate-400">GOOGLE</div>
                        <div class="text-2xl font-black text-slate-400 italic">netflix</div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = () => {
            loadData();
            navigate(state.user ? 'dashboard' : 'home');
        };

    </script>
</body>
</html>
